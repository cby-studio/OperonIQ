<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1495FF"/>
      <stop offset="45%"  stop-color="#20C5E8"/>
      <stop offset="100%" stop-color="#44D062"/>
    </linearGradient>
  </defs>

  <!-- Dark navy background with rounded corners -->
  <rect width="100" height="100" rx="14" fill="#071426"/>

  <!-- Connecting lines (drawn first so nodes sit on top) -->
  <g stroke="url(#g)" stroke-width="1.8" stroke-linecap="round" opacity="0.7">
    <line x1="22" y1="22" x2="42" y2="12"/>
    <line x1="22" y1="22" x2="12" y2="45"/>
    <line x1="42" y1="12" x2="62" y2="16"/>
    <line x1="42" y1="12" x2="35" y2="42"/>
    <line x1="62" y1="16" x2="54" y2="35"/>
    <line x1="12" y1="45" x2="35" y2="42"/>
    <line x1="35" y1="42" x2="54" y2="35"/>
    <line x1="35" y1="42" x2="44" y2="60"/>
    <line x1="54" y1="35" x2="72" y2="28"/>
    <line x1="54" y1="35" x2="66" y2="55"/>
    <line x1="72" y1="28" x2="82" y2="45"/>
    <line x1="44" y1="60" x2="66" y2="55"/>
    <line x1="44" y1="60" x2="62" y2="74"/>
    <line x1="66" y1="55" x2="82" y2="45"/>
    <line x1="66" y1="55" x2="62" y2="74"/>
    <line x1="82" y1="45" x2="78" y2="68"/>
    <line x1="62" y1="74" x2="78" y2="68"/>
  </g>

  <!-- Nodes -->
  <g fill="url(#g)">
    <circle cx="22" cy="22" r="5.5"/>
    <circle cx="42" cy="12" r="5.5"/>
    <circle cx="62" cy="16" r="5.5"/>
    <circle cx="12" cy="45" r="5.5"/>
    <circle cx="35" cy="42" r="6.5"/>
    <circle cx="54" cy="35" r="5.5"/>
    <circle cx="72" cy="28" r="5.5"/>
    <circle cx="44" cy="60" r="5.5"/>
    <circle cx="66" cy="55" r="5.5"/>
    <circle cx="82" cy="45" r="5.5"/>
    <circle cx="62" cy="74" r="5.5"/>
    <circle cx="78" cy="68" r="5.5"/>
  </g>
</svg>
